<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Persona Script Evaluator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #090a0f, #1a1025, #0a1128, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Neon text and shadows */
        .neon-blue-text {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .neon-pink-text {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .neon-blue-border {
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .neon-pink-border {
            border-color: rgba(255, 0, 85, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 0, 85, 0.1);
        }
        
        /* Input & Textarea Glass Styling */
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #00f0ff;
            outline: none;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        /* High-Tech Loader */
        .tech-loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 240, 255, 0.1);
            border-left-color: #00f0ff;
            border-right-color: #ff0055;
            border-radius: 50%;
            animation: spin 1s linear infinite, pulse 2s ease-in-out infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(255, 0, 85, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.6), inset 0 0 20px rgba(255, 0, 85, 0.6); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">

    <!-- Header -->
    <header class="mb-10 text-center relative z-10">
        <h1 class="text-5xl md:text-6xl font-extrabold neon-blue-text tracking-tighter uppercase mb-2">🎭 Matinee AI</h1>
        <p class="mt-2 text-gray-300 font-light tracking-wide text-lg">Predictive Audience Evaluation for Film & Content</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">

        <!-- LEFT COLUMN: Persona Management -->
        <div class="lg:col-span-4 space-y-6">

            <!-- Persona List Panel -->
            <div class="glass-panel rounded-2xl p-6 neon-blue-border transition-all duration-300 hover:shadow-[0_0_30px_rgba(0,240,255,0.15)]">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700/50 pb-3 neon-pink-text uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Audience Nodes
                </h2>
                <div id="persona-list" class="space-y-3 max-h-[22rem] overflow-y-auto pr-2">
                    <!-- Personas will be injected here by JS -->
                </div>
            </div>

            <!-- Add New Persona Panel -->
            <div class="glass-panel rounded-2xl p-6 neon-pink-border transition-all duration-300 hover:shadow-[0_0_30px_rgba(255,0,85,0.15)]">
                <h2 class="text-lg font-bold mb-4 neon-blue-text uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Synthesize Node
                </h2>
                <input type="text" id="new-persona-name" placeholder="e.g., A24 Horror Buff" class="w-full mb-3 px-4 py-3 glass-input rounded-xl text-sm">
                <textarea id="new-persona-desc" rows="3" placeholder="Description (e.g., A 25-year-old film student who loves slow-burn psychological thrillers...)" class="w-full mb-5 px-4 py-3 glass-input rounded-xl text-sm leading-relaxed"></textarea>
                <button onclick="addPersona()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3.5 rounded-xl transition-all transform hover:-translate-y-1 shadow-[0_0_20px_rgba(0,240,255,0.4)] tracking-widest text-sm uppercase">
                    Initialize Persona
                </button>
            </div>
        </div>

        <!-- RIGHT COLUMN: Script Input & Results -->
        <div class="lg:col-span-8 space-y-8">

            <!-- Script Input -->
            <div class="glass-panel rounded-2xl p-6 relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-r from-pink-500/10 to-blue-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <h2 class="text-xl font-bold mb-4 neon-blue-text uppercase tracking-widest relative z-10 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Input Transmission
                </h2>
                <textarea id="script-content" rows="6" placeholder="Enter your screenplay excerpt, video script, or film premise here..." class="w-full p-5 glass-input rounded-xl mb-6 font-mono text-sm leading-relaxed relative z-10"></textarea>

                <button id="run-btn" onclick="runEvaluations()" class="bg-gradient-to-r from-[#ff0055] to-[#00f0ff] hover:from-[#ff0055]/90 hover:to-[#00f0ff]/90 text-white font-black py-4 px-8 rounded-xl transition-all transform hover:-translate-y-1 w-full shadow-[0_0_25px_rgba(255,0,85,0.5)] text-lg tracking-widest uppercase relative z-10 overflow-hidden">
                    Commence Evaluation Sequence
                </button>
            </div>

            <!-- Loader Container -->
            <div id="loading-container" class="space-y-4 hidden h-64 flex-col items-center justify-center">
                <!-- Loaders injected here -->
            </div>

            <!-- Unified Results Dashboard -->
            <div id="dashboard-container" class="hidden space-y-8 animate-[fadeIn_0.5s_ease-out]">

                <!-- Metrics Table -->
                <div class="glass-panel rounded-2xl p-6 neon-blue-border overflow-x-auto">
                    <h3 class="text-xl font-bold mb-4 neon-pink-text uppercase tracking-widest border-b border-gray-700/50 pb-3">Film & Content Matrix</h3>
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-gray-300 uppercase tracking-wider text-xs bg-black/20">
                            <tr>
                                <th class="px-5 py-4 rounded-tl-xl font-bold">Persona Node</th>
                                <th class="px-5 py-4 text-center font-bold">Overall Rating</th>
                                <th class="px-5 py-4 text-center font-bold">Attention Hook</th>
                                <th class="px-5 py-4 text-center font-bold">Emotional Res.</th>
                                <th class="px-5 py-4 text-center font-bold">Binge-ability</th>
                                <th class="px-5 py-4 text-center rounded-tr-xl font-bold">Share Flow</th>
                            </tr>
                        </thead>
                        <tbody id="metrics-table-body" class="divide-y divide-gray-700/30">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>

                <!-- Visualization Graph -->
                <div class="glass-panel rounded-2xl p-6 neon-pink-border">
                    <h3 class="text-xl font-bold mb-4 neon-blue-text uppercase tracking-widest border-b border-gray-700/50 pb-3">Resonance Visualization</h3>
                    <div class="relative h-80 w-full">
                        <canvas id="resultsChart"></canvas>
                    </div>
                </div>

                <!-- Detailed Feedback Cards -->
                <div id="feedback-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Cards injected here -->
                </div>

            </div>
        </div>

    </main>

    <script>
        // Film-focused Default personas
        const defaultPersonas = [
            { id: 1, name: 'A24 Enthusiast', description: 'A 26-year-old film student. Loves slow-burn horror, psychological thrillers, and practical effects. Hates cheap jump scares and obvious CGI.', selected: true },
            { id: 2, name: 'TikTok Scroller', description: '19-year-old college student. Attention span is extremely short. Needs a hook in the first 3 seconds or they swipe away. Likes comedy and high-energy drama.', selected: false },
            { id: 3, name: 'Blockbuster Dad', description: '45-year-old father. Watches movies to turn his brain off. Loves high-budget action, clear good vs. evil plots, and Tom Cruise stunts.', selected: false }
        ];

        let personas = [];
        let chartInstance = null;

        // --- Initialization ---
        function init() {
            const stored = localStorage.getItem('ai_personas_neon');
            if (stored) {
                personas = JSON.parse(stored);
            } else {
                personas = [...defaultPersonas];
                savePersonas();
            }
            renderPersonas();
        }

        function savePersonas() {
            localStorage.setItem('ai_personas_neon', JSON.stringify(personas));
        }

        function togglePersona(id) {
            const persona = personas.find(p => p.id === id);
            if (persona) {
                persona.selected = !persona.selected;
                savePersonas();
            }
        }

        function deletePersona(id) {
            personas = personas.filter(p => p.id !== id);
            savePersonas();
            renderPersonas();
        }

        function addPersona() {
            const nameInput = document.getElementById('new-persona-name');
            const descInput = document.getElementById('new-persona-desc');

            if (!nameInput.value.trim() || !descInput.value.trim()) {
                alert("Please provide both a name and description.");
                return;
            }

            const newPersona = {
                id: Date.now(),
                name: nameInput.value.trim(),
                description: descInput.value.trim(),
                selected: true
            };

            personas.push(newPersona);
            savePersonas();
            renderPersonas();

            nameInput.value = '';
            descInput.value = '';
        }

        // --- UI Rendering ---
        function renderPersonas() {
            const list = document.getElementById('persona-list');
            list.innerHTML = '';

            if (personas.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-500 italic">No nodes connected.</p>`;
                return;
            }

            personas.forEach(p => {
                const item = document.createElement('div');
                item.className = 'flex items-start justify-between p-4 rounded-xl bg-black/20 hover:bg-black/40 border border-white/5 transition-all group';

                item.innerHTML = `
                    <label class="flex items-start space-x-4 cursor-pointer flex-1">
                        <input type="checkbox" class="mt-1 h-5 w-5 rounded border-gray-600 text-[#ff0055] focus:ring-[#ff0055] bg-black/50 transition-colors" 
                            ${p.selected ? 'checked' : ''} onchange="togglePersona(${p.id})">
                        <div>
                            <p class="font-bold text-gray-100 group-hover:text-[#00f0ff] transition-colors text-lg">${p.name}</p>
                            <p class="text-sm text-gray-400 line-clamp-2 mt-1 font-light leading-relaxed">${p.description}</p>
                        </div>
                    </label>
                    <button onclick="deletePersona(${p.id})" class="ml-3 text-gray-500 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-500/10" title="Sever Connection">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                list.appendChild(item);
            });
        }

        // --- API Execution and Result Processing ---
        async function runEvaluations() {
            const script = document.getElementById('script-content').value.trim();
            const loadingContainer = document.getElementById('loading-container');
            const dashboardContainer = document.getElementById('dashboard-container');

            if (!script) {
                alert("Please enter a transmission payload (script).");
                return;
            }

            const activePersonas = personas.filter(p => p.selected);
            if (activePersonas.length === 0) {
                alert("Please activate at least one persona node.");
                return;
            }

            // UI State updates
            dashboardContainer.classList.add('hidden');
            loadingContainer.classList.remove('hidden');
            loadingContainer.innerHTML = '';

            const runBtn = document.getElementById('run-btn');
            runBtn.disabled = true;
            runBtn.classList.add('opacity-50', 'cursor-not-allowed');
            runBtn.innerText = "PROCESSING...";

            activePersonas.forEach(p => {
                const loaderCard = document.createElement('div');
                loaderCard.id = `load-${p.id}`;
                loaderCard.className = 'glass-panel rounded-xl p-5 w-full max-w-md flex items-center space-x-6 animate-pulse';
                loaderCard.innerHTML = `
                    <div class="tech-loader"></div>
                    <div>
                        <h3 class="font-mono text-[#00f0ff] text-sm md:text-base tracking-wide uppercase">Establishing Neural Link</h3>
                        <p class="text-xs text-gray-400 mt-1">Uplifting payload to node: <span class="text-[#ff0055] font-bold">${p.name}</span></p>
                    </div>
                `;
                loadingContainer.appendChild(loaderCard);
            });

            const resultsData = [];

            // Fire API calls
            const fetchPromises = activePersonas.map(async (persona) => {
                try {
                    const response = await fetch('http://127.0.0.1:8000/evaluate/custom', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            persona_description: persona.description,
                            content: script
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const data = await response.json();
                    resultsData.push({ persona, data, success: true });
                } catch (error) {
                    resultsData.push({ persona, error: error.message, success: false });
                }
            });

            await Promise.all(fetchPromises);

            // Hide loading, show dashboard
            loadingContainer.classList.add('hidden');
            renderDashboard(resultsData);

            runBtn.disabled = false;
            runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            runBtn.innerText = "Commence Evaluation Sequence";
        }

        function renderDashboard(results) {
            document.getElementById('dashboard-container').classList.remove('hidden');

            const tableBody = document.getElementById('metrics-table-body');
            const feedbackContainer = document.getElementById('feedback-container');

            tableBody.innerHTML = '';
            feedbackContainer.innerHTML = '';

            const chartLabels = [];
            const hookScores = [];
            const emotionalScores = [];
            const bingeScores = [];

            results.forEach(res => {
                if (res.success) {
                    const data = res.data;
                    const p = res.persona;

                    // Populate Chart Data Arrays
                    chartLabels.push(p.name);
                    hookScores.push(data.attention_hook);
                    emotionalScores.push(data.emotional_resonance);
                    bingeScores.push(data.binge_ability);

                    // --- Render Table Row ---
                    const row = document.createElement('tr');
                    row.className = "hover:bg-white/5 transition-colors group";

                    const shareStyle = data.would_share
                        ? 'bg-[#00f0ff]/10 text-[#00f0ff] border-[#00f0ff]/30'
                        : 'bg-[#ff0055]/10 text-[#ff0055] border-[#ff0055]/30';
                    const shareText = data.would_share ? 'VIRAL' : 'STATIC';

                    row.innerHTML = `
                        <td class="px-5 py-4 font-bold text-gray-100 group-hover:text-white">${p.name}</td>
                        <td class="px-5 py-4 text-center text-lg text-white font-black">${data.overall_rating}<span class="text-xs text-gray-500 font-normal">/10</span></td>
                        <td class="px-5 py-4 text-center text-lg text-[#00f0ff] font-bold">${data.attention_hook}<span class="text-xs text-gray-500 font-normal">/10</span></td>
                        <td class="px-5 py-4 text-center text-lg text-[#ff0055] font-bold">${data.emotional_resonance}<span class="text-xs text-gray-500 font-normal">/10</span></td>
                        <td class="px-5 py-4 text-center text-lg text-purple-400 font-bold">${data.binge_ability}<span class="text-xs text-gray-500 font-normal">/10</span></td>
                        <td class="px-5 py-4 text-center">
                            <span class="px-3 py-1 text-xs font-black tracking-widest rounded border ${shareStyle}">${shareText}</span>
                        </td>
                    `;
                    tableBody.appendChild(row);

                    // --- Render Feedback Card ---
                    const fCard = document.createElement('div');
                    fCard.className = "glass-panel rounded-2xl p-6 relative overflow-hidden group hover:border-[#00f0ff]/50 transition-colors h-full flex flex-col";
                    fCard.innerHTML = `
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-[#00f0ff] to-[#ff0055]"></div>
                        <h4 class="font-bold text-xl text-white mb-2 ml-3 flex items-center justify-between">
                            ${p.name}
                            <span class="text-xs font-mono text-gray-500 bg-black/40 px-2 py-1 rounded">ID: ${data.generated_name}</span>
                        </h4>
                        
                        <div class="ml-3 mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
                            <p class="text-xs text-[#ff0055] font-bold uppercase tracking-wider mb-1">Controversy / Alienation Risk</p>
                            <p class="text-sm text-red-100">${data.controversy_risk}</p>
                        </div>
                        
                        <p class="text-xs text-[#00f0ff] font-bold tracking-widest mb-2 ml-3 pb-2 border-b border-white/10 uppercase">Raw Feedback Stream</p>
                        <blockquote class="text-gray-300 font-light leading-relaxed ml-3 flex-grow italic">
                            "${data.feedback}"
                        </blockquote>
                    `;
                    feedbackContainer.appendChild(fCard);

                } else {
                    // Handle Error rendering
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-5 py-4 font-bold text-red-400">${res.persona.name}</td>
                        <td colspan="5" class="px-5 py-4 text-[#ff0055] font-mono text-sm">CONNECTION FAILED: ${res.error}</td>
                     `;
                    tableBody.appendChild(row);
                }
            });

            renderChart(chartLabels, hookScores, emotionalScores, bingeScores);
        }

        function renderChart(labels, hook, emotion, binge) {
            const ctx = document.getElementById('resultsChart').getContext('2d');

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Outfit', sans-serif";

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Attention Hook',
                            data: hook,
                            backgroundColor: 'rgba(0, 240, 255, 0.7)', 
                            borderColor: '#00f0ff',
                            borderWidth: 1,
                            borderRadius: 6
                        },
                        {
                            label: 'Emotional Res.',
                            data: emotion,
                            backgroundColor: 'rgba(255, 0, 85, 0.7)',
                            borderColor: '#ff0055',
                            borderWidth: 1,
                            borderRadius: 6
                        },
                        {
                            label: 'Binge-ability',
                            data: binge,
                            backgroundColor: 'rgba(168, 85, 247, 0.7)', // Purple
                            borderColor: '#a855f7',
                            borderWidth: 1,
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 10,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)', 
                                drawBorder: false
                            }
                        },
                        x: {
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { color: '#e2e8f0', font: {family: "'Outfit', sans-serif"} } },
                        tooltip: { backgroundColor: 'rgba(0, 0, 0, 0.8)', titleColor: '#00f0ff', bodyColor: '#e2e8f0', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
                    }
                }
            });
        }

        // Start app
        init();
    </script>
</body>

</html>
