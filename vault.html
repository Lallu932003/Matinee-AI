<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience Vault | Matinee AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen">
    <div id="cursor" class="cursor-follower"></div>
    <div class="bg-blobs">
        <div class="blob" style="top: 10%; left: 10%;"></div>
        <div class="blob" style="bottom: 10%; right: 10%; animation-delay: -5s;"></div>
    </div>

    <!-- NAVIGATION -->
    <header class="sticky top-0 bg-black/80 backdrop-blur-md z-50 border-b border-white/5 py-4">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black uppercase italic tracking-tighter">Matinee <span class="gradient-text">AI</span></a>
            <nav class="flex gap-4">
                <a href="evaluation.html" class="nav-tab">Evaluation Lab</a>
                <a href="vault.html" class="nav-tab active">Audience Vault</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-12">
        <!-- AUDIENCE VAULT -->
        <section id="management-view" class="view-section animate-fade-in space-y-8">
            <div class="sub-nav">
                <div onclick="showSubView('list')" id="sub-tab-list" class="sub-tab active">Audience Vault</div>
                <div onclick="showSubView('create')" id="sub-tab-create" class="sub-tab">Persona Studio</div>
            </div>

            <!-- List View -->
            <div id="management-list-subview" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Populated by JS -->
            </div>

            <!-- Create View -->
            <div id="management-create-subview" class="hidden max-w-2xl glass-panel rounded-3xl p-10 animate-fade-in">
                <h2 class="text-3xl font-black mb-8 uppercase italic">Persona <span class="text-red-500">Studio</span></h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black tracking-widest text-slate-500">Group Designation</label>
                        <input type="text" id="group-name" placeholder="e.g. Malabar Cinephiles" class="w-full p-4 glass-input rounded-2xl text-lg font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-black tracking-widest text-slate-500">Target Era</label>
                            <select id="group-age" class="w-full p-4 glass-input rounded-2xl font-bold">
                                <option value="18-25">Gen-Z (18-25)</option>
                                <option value="26-40">Millennials (26-40)</option>
                                <option value="41-60">Adults (41-60)</option>
                                <option value="60+">Elders (60+)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-black tracking-widest text-slate-500">Gender Flow</label>
                            <select id="group-gender" class="w-full p-4 glass-input rounded-2xl font-bold">
                                <option value="Diverse">Diverse</option>
                                <option value="Mostly Male">Mostly Male</option>
                                <option value="Mostly Female">Mostly Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black tracking-widest text-slate-500">Persona Count</label>
                        <input type="range" id="group-count" value="10" min="5" max="15" oninput="this.nextElementSibling.value = this.value" class="w-full accent-red-500 mt-2">
                        <output class="text-sm font-bold text-red-500">10</output>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black tracking-widest text-slate-500">Cultural Context / Details</label>
                        <textarea id="group-details" rows="4" placeholder="Fans of realistic drama, residents of Idukki, lovers of vintage Prem Nazir movies..." class="w-full p-4 glass-input rounded-2xl leading-relaxed"></textarea>
                    </div>
                    <button id="gen-group-btn" onclick="generateGroup()" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-5 rounded-2xl transition-all shadow-lg text-lg uppercase tracking-widest">
                        Initialize Generation
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>

    <!-- PERSONA EDIT MODAL -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="max-w-md w-full glass-panel rounded-3xl p-10 animate-fade-in relative">
            <button onclick="closeEditModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-2xl font-black mb-8 uppercase italic">Edit <span class="text-red-500">Persona</span></h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-persona-id">
                <input type="hidden" id="edit-group-id">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block mb-1">Name</label>
                    <input type="text" id="edit-persona-name" class="w-full p-3 glass-input rounded-xl font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block mb-1">Age</label>
                        <input type="number" id="edit-persona-age" class="w-full p-3 glass-input rounded-xl font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block mb-1">Gender</label>
                        <input type="text" id="edit-persona-gender" class="w-full p-3 glass-input rounded-xl font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 block mb-1">Bio / Context</label>
                    <textarea id="edit-persona-bio" rows="3" class="w-full p-3 glass-input rounded-xl text-sm italic"></textarea>
                </div>
                <button onclick="savePersonaEdit()" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-black rounded-xl uppercase tracking-widest shadow-lg mt-4 transition-all">
                    Update Registry
                </button>
            </div>
        </div>
    </div>

    <!-- CONFIRMATION MODAL -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="max-w-sm w-full glass-panel rounded-3xl p-8 animate-fade-in text-center">
            <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-xl font-black uppercase italic mb-2">Are you sure?</h3>
            <p id="confirm-message" class="text-sm text-slate-400 mb-8 px-4">This action cannot be undone.</p>
            <div class="flex gap-4">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl font-bold uppercase tracking-widest text-xs transition-all">Cancel</button>
                <button id="confirm-action-btn" class="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-black uppercase tracking-widest text-xs text-white transition-all shadow-lg shadow-red-600/20">Delete</button>
            </div>
        </div>
    </div>
</body>
</html>
